<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODEX - Sudoku Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>CODEX</h1>
            <p class="subtitle">Sudoku Puzzle Generator & Solver</p>
        </header>

        <div class="controls">
            <div class="button-group">
                <button id="newGame" class="btn btn-primary">New Game</button>
                <button id="hint" class="btn btn-secondary">Hint</button>
                <button id="solve" class="btn btn-secondary">Solve</button>
                <button id="clear" class="btn btn-secondary">Clear</button>
            </div>
            
            <div class="difficulty-selector">
                <label>Difficulty:</label>
                <select id="difficulty">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                    <option value="expert">Expert</option>
                </select>
            </div>
        </div>

        <div class="game-wrapper">
            <div class="game-container">
                <div class="sudoku-board" id="board"></div>
                <div class="number-pad">
                    <button class="num-btn" data-num="1">1</button>
                    <button class="num-btn" data-num="2">2</button>
                    <button class="num-btn" data-num="3">3</button>
                    <button class="num-btn" data-num="4">4</button>
                    <button class="num-btn" data-num="5">5</button>
                    <button class="num-btn" data-num="6">6</button>
                    <button class="num-btn" data-num="7">7</button>
                    <button class="num-btn" data-num="8">8</button>
                    <button class="num-btn" data-num="9">9</button>
                    <button class="num-btn" id="clearBtn" data-num="clear">✕</button>
                </div>
            </div>

            <div class="info-panel">
                <div class="status-box">
                    <h3>Status</h3>
                    <p id="status">Ready</p>
                </div>
                <div class="timer-box">
                    <h3>Time Elapsed</h3>
                    <p id="timer">0:00</p>
                </div>
                <div class="stats-box">
                    <h3>Stats</h3>
                    <p>Hints Used: <span id="hintCount">0</span></p>
                    <p>Errors: <span id="errorCount">0</span></p>
                </div>
            </div>
        </div>

        <footer>
            <p>Sudoku Puzzle Generator with Solver - Built with HTML5, CSS3, and JavaScript</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
